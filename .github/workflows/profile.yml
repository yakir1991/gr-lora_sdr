---
name: host-profile

'on':
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install profiling tools
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind linux-tools-common \
            linux-tools-generic
      - name: Install Liquid DSP
        run: |
          sudo apt-get update
          sudo apt-get install -y libliquid-dev
      - name: Run profiling script
        run: |
          chmod +x scripts/profile_host.sh
          ./scripts/profile_host.sh
      - name: Prepare benchmark results directory
        run: mkdir -p results
      - name: Run bench_lora_chain for CSV
        working-directory: results
        run: ../build/tests/bench_lora_chain 2> bench_stderr.log
      - name: Upload profiling artifacts
        uses: actions/upload-artifact@v4
        with:
          name: host-profile
          path: |
            results/profile_*.txt
            results/bench_results.csv
            results/bench_stderr.log
